<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Chicken Rush</title>
  <style>
    :root{
      --bg-1:#120905;
      --bg-2:#26110a;
      --bg-3:#0f1116;
      --glass:rgba(255,255,255,.09);
      --glass-2:rgba(255,255,255,.14);
      --line:rgba(255,255,255,.14);
      --text:#fff8ee;
      --muted:rgba(255,245,227,.74);
      --orange:#ff8c32;
      --gold:#ffd453;
      --teal:#52e4c4;
      --red:#ff5b4d;
      --shadow:0 18px 50px rgba(0,0,0,.28);
      --radius:24px;
      --heading:"Arial Black","Franklin Gothic Heavy","Impact",sans-serif;
      --body:"Trebuchet MS","Gill Sans","Segoe UI",sans-serif;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      overflow:hidden;
      color:var(--text);
      font-family:var(--body);
      background:
        radial-gradient(1000px 700px at 20% 0%, rgba(255,138,58,.2), transparent 48%),
        radial-gradient(800px 600px at 82% 12%, rgba(82,228,196,.16), transparent 42%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 38%, var(--bg-3) 100%);
      user-select:none;
      -webkit-user-select:none;
      touch-action:manipulation;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
    }

    body::before{
      background:
        radial-gradient(circle at 50% 110%, rgba(255,192,72,.18), transparent 32%),
        radial-gradient(circle at 50% 50%, transparent 42%, rgba(0,0,0,.22) 100%);
    }

    body::after{
      opacity:.15;
      background-image:
        radial-gradient(rgba(255,255,255,.18) 1px, transparent 1.6px);
      background-size:22px 22px;
      mask-image:linear-gradient(to bottom, rgba(0,0,0,.95), rgba(0,0,0,.2));
    }

    .scene,
    #app,
    .screen{
      position:fixed;
      inset:0;
    }

    .scene{
      overflow:hidden;
      z-index:0;
      pointer-events:none;
    }

    .orb{
      position:absolute;
      border-radius:50%;
      filter:blur(55px);
      opacity:.42;
      mix-blend-mode:screen;
      animation:drift 14s ease-in-out infinite alternate;
    }

    .orb.a{
      width:42vw;
      aspect-ratio:1;
      left:-8vw;
      top:8vh;
      background:radial-gradient(circle, rgba(255,147,51,.95), rgba(255,147,51,0));
    }

    .orb.b{
      width:34vw;
      aspect-ratio:1;
      right:-6vw;
      top:14vh;
      background:radial-gradient(circle, rgba(82,228,196,.88), rgba(82,228,196,0));
      animation-duration:18s;
    }

    .orb.c{
      width:38vw;
      aspect-ratio:1;
      left:30vw;
      bottom:-12vh;
      background:radial-gradient(circle, rgba(255,212,83,.66), rgba(255,212,83,0));
      animation-duration:16s;
    }

    #app{z-index:1}

    .screen{
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      padding:clamp(20px, 4vw, 44px);
      opacity:0;
      pointer-events:none;
      transform:scale(.98);
      transition:opacity .45s ease, transform .45s ease;
    }

    .screen.active{
      opacity:1;
      pointer-events:auto;
      transform:scale(1);
    }

    #gameScreen{display:block;padding:0;transform:none}
    #gameScreen.active{opacity:1;pointer-events:auto}

    .heroMascot{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      font-size:min(48vw, 420px);
      line-height:1;
      opacity:.12;
      filter:drop-shadow(0 20px 60px rgba(255,157,72,.18));
      animation:floatMascot 6s ease-in-out infinite;
      pointer-events:none;
    }

    .title{
      position:relative;
      z-index:2;
      margin:0;
      font-family:var(--heading);
      font-size:clamp(72px, 15vw, 168px);
      line-height:.82;
      letter-spacing:.08em;
      text-transform:uppercase;
      background:linear-gradient(180deg, #fff5c8 0%, #ffd35a 32%, #ff9834 72%, #ff6e2d 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow:0 0 40px rgba(255,154,66,.22);
    }

    .subtitle{
      position:relative;
      z-index:2;
      max-width:700px;
      margin:0;
      text-align:center;
      color:var(--muted);
      font-size:clamp(16px, 2.2vw, 24px);
      line-height:1.4;
    }

    .ctaRow{
      position:relative;
      z-index:2;
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:10px;
    }

    button{
      border:0;
      outline:0;
      cursor:pointer;
      font-family:var(--heading);
      font-size:clamp(16px, 2vw, 18px);
      letter-spacing:.08em;
      text-transform:uppercase;
      border-radius:999px;
      padding:16px 28px;
      transition:transform .16s ease, box-shadow .16s ease, filter .16s ease, background .16s ease;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }

    button:hover{transform:translateY(-1px)}
    button:active{transform:translateY(1px) scale(.985)}

    .primaryBtn{
      color:#2a1202;
      background:linear-gradient(180deg, #ffe27a 0%, #ffb53f 45%, #ff8a2b 100%);
      box-shadow:0 18px 40px rgba(255,132,42,.36), inset 0 1px 0 rgba(255,255,255,.7);
    }

    .secondaryBtn,
    .ghostBtn{
      color:var(--text);
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.08));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
    }

    .boardLine{
      position:relative;
      z-index:2;
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      justify-content:center;
      align-items:center;
      margin-top:8px;
      color:var(--muted);
      text-align:center;
      font-size:clamp(14px,1.8vw,18px);
    }

    .boardLine strong{
      color:#fff8cf;
      font-family:var(--heading);
      letter-spacing:.05em;
    }

    .recentWrap{
      position:relative;
      z-index:2;
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      color:rgba(255,245,227,.68);
      font-size:14px;
    }

    .recentScores{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:center;
      min-height:28px;
    }

    .recentScore{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.06);
      color:#fff3ce;
      backdrop-filter:blur(10px);
      min-width:34px;
      text-align:center;
    }

    .muted{opacity:.6;font-style:italic}

    .hud{
      position:absolute;
      top:max(14px, env(safe-area-inset-top));
      left:max(14px, env(safe-area-inset-left));
      right:max(14px, env(safe-area-inset-right));
      min-height:74px;
      padding:14px 18px;
      display:flex;
      align-items:center;
      gap:18px;
      justify-content:space-between;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.07));
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px) saturate(140%);
      z-index:5;
    }

    .miniBrand{
      font-family:var(--heading);
      letter-spacing:.12em;
      text-transform:uppercase;
      font-size:clamp(18px, 3vw, 30px);
      color:#ffe5b0;
      white-space:nowrap;
    }

    .hudStats{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:clamp(12px, 2vw, 26px);
      flex-wrap:wrap;
    }

    .metric{
      display:flex;
      align-items:baseline;
      gap:8px;
      white-space:nowrap;
    }

    .metric span{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(255,245,227,.66);
    }

    .metric strong{
      font-family:var(--heading);
      font-size:clamp(20px, 3.2vw, 34px);
      letter-spacing:.04em;
      color:#fff8cf;
      text-shadow:0 0 18px rgba(255,212,83,.12);
    }

    .metric strong.pop{
      animation:metricPop .22s ease;
    }

    .ghostBtn{
      padding:12px 18px;
      min-width:110px;
      font-size:14px;
    }

    .timerRail{
      position:absolute;
      top:100px;
      left:max(14px, env(safe-area-inset-left));
      right:max(14px, env(safe-area-inset-right));
      height:7px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.08);
      z-index:4;
    }

    #timerFill{
      width:100%;
      height:100%;
      transform-origin:left center;
      background:linear-gradient(90deg, var(--teal) 0%, var(--gold) 60%, var(--orange) 100%);
      box-shadow:0 0 24px rgba(255,198,66,.45);
    }

    #arena{
      position:absolute;
      inset:118px 0 0 0;
      overflow:hidden;
      z-index:2;
      touch-action:manipulation;
    }

    #arena::before{
      content:"";
      position:absolute;
      inset:auto 0 4vh 0;
      margin:auto;
      width:min(62vw, 760px);
      height:min(32vw, 220px);
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,171,51,.14), rgba(255,171,51,0) 72%);
      filter:blur(20px);
      pointer-events:none;
    }

    #chickenMover{
      position:absolute;
      left:0;
      top:0;
      width:110px;
      height:110px;
      transform:translate(0,0);
      transition:transform .7s cubic-bezier(.2,.8,.2,1);
      will-change:transform;
      z-index:3;
    }

    #chicken{
      --size:110px;
      width:var(--size);
      height:var(--size);
      border-radius:50%;
      border:1px solid rgba(255,255,255,.18);
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.42), rgba(255,255,255,.14) 42%, rgba(255,255,255,.07) 68%, rgba(255,255,255,.04) 100%);
      box-shadow:
        0 18px 36px rgba(0,0,0,.28),
        inset 0 1px 0 rgba(255,255,255,.52),
        0 0 28px rgba(255,175,59,.18);
      backdrop-filter:blur(16px) saturate(140%);
      display:grid;
      place-items:center;
      position:relative;
      padding:0;
      overflow:visible;
    }

    #chicken::before{
      content:"";
      position:absolute;
      inset:-12px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,199,86,.32), rgba(255,199,86,0) 70%);
      z-index:-1;
      animation:pulseHalo 1.4s ease-out infinite;
    }

    #chicken::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);
      pointer-events:none;
    }

    .chickenGlyph{
      font-size:calc(var(--size) * .58);
      line-height:1;
      filter:drop-shadow(0 7px 10px rgba(0,0,0,.22));
      animation:hop 1.12s ease-in-out infinite;
      transform-origin:center 70%;
      pointer-events:none;
    }

    #chicken:hover{filter:brightness(1.08)}
    #chicken.hit{animation:hitBurst .24s ease}
    #chicken.hit .chickenGlyph{animation:impact .24s ease}

    #pauseOverlay{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      background:rgba(13,10,10,.34);
      backdrop-filter:blur(10px);
      opacity:0;
      pointer-events:none;
      transition:opacity .22s ease;
      z-index:8;
    }

    #pauseOverlay.show{
      opacity:1;
      pointer-events:auto;
    }

    .overlayPanel{
      padding:28px 26px;
      text-align:center;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.08));
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
      max-width:min(90vw, 420px);
    }

    .overlayTitle{
      margin:0 0 8px;
      font-family:var(--heading);
      font-size:clamp(34px, 7vw, 56px);
      line-height:.9;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#fff2c2;
    }

    .overlayText{
      margin:0 0 18px;
      color:var(--muted);
      font-size:clamp(15px,2.5vw,18px);
    }

    .finalLabel{
      position:relative;
      z-index:2;
      margin:0;
      font-family:var(--heading);
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(255,245,227,.7);
      font-size:clamp(16px,2vw,20px);
    }

    .finalScore{
      position:relative;
      z-index:2;
      margin:0;
      font-family:var(--heading);
      font-size:clamp(90px, 18vw, 220px);
      line-height:.85;
      letter-spacing:.02em;
      color:#fff7d4;
      text-shadow:0 0 30px rgba(255,212,83,.16);
    }

    .bestNote{
      position:relative;
      z-index:2;
      margin:0;
      min-height:24px;
      color:#ffe27a;
      font-family:var(--heading);
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:clamp(14px,2vw,18px);
    }

    .particle,
    .floatText,
    .hitRing,
    .missRipple,
    .confetti{
      position:absolute;
      pointer-events:none;
    }

    .particle{
      z-index:6;
      font-size:18px;
      line-height:1;
      text-shadow:0 0 18px currentColor;
      animation:particleFly .75s cubic-bezier(.18,.7,.2,1) forwards;
    }

    .floatText{
      z-index:7;
      font-family:var(--heading);
      font-size:clamp(16px, 3vw, 26px);
      color:#fff8c9;
      letter-spacing:.05em;
      text-shadow:0 6px 18px rgba(0,0,0,.28);
      animation:floatUp .82s ease forwards;
    }

    .hitRing{
      z-index:6;
      width:18px;
      height:18px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.84);
      box-shadow:0 0 16px rgba(255,255,255,.25);
      animation:ringExpand .42s ease forwards;
    }

    .missRipple{
      z-index:5;
      width:18px;
      height:18px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.22);
      animation:missExpand .38s ease forwards;
    }

    .shake{
      animation:screenShake .22s linear;
    }

    .confetti{
      z-index:3;
      width:10px;
      height:18px;
      border-radius:4px;
      opacity:.92;
      animation:confettiFall 2s cubic-bezier(.14,.7,.2,1) forwards;
    }

    @keyframes drift{
      0%{transform:translate3d(0,0,0) scale(1)}
      100%{transform:translate3d(6vw,-3vh,0) scale(1.16)}
    }

    @keyframes floatMascot{
      0%,100%{transform:translate(-50%,-50%) translateY(0)}
      50%{transform:translate(-50%,-50%) translateY(-12px)}
    }

    @keyframes pulseHalo{
      0%{transform:scale(.9);opacity:.36}
      75%{transform:scale(1.08);opacity:.16}
      100%{transform:scale(1.14);opacity:0}
    }

    @keyframes hop{
      0%,100%{transform:translateY(0) rotate(-3deg)}
      50%{transform:translateY(-4px) rotate(3deg)}
    }

    @keyframes hitBurst{
      0%{transform:scale(1)}
      45%{transform:scale(1.14)}
      100%{transform:scale(1)}
    }

    @keyframes impact{
      0%{transform:scale(1) rotate(0deg)}
      50%{transform:scale(.88) rotate(-8deg)}
      100%{transform:scale(1.06) rotate(6deg)}
    }

    @keyframes particleFly{
      from{
        transform:translate(-50%,-50%) scale(1) rotate(0deg);
        opacity:1;
      }
      to{
        transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.15) rotate(var(--rot));
        opacity:0;
      }
    }

    @keyframes floatUp{
      0%{transform:translate(-50%,-25%) scale(.82);opacity:0}
      14%{opacity:1}
      100%{transform:translate(-50%,-150%) scale(1.08);opacity:0}
    }

    @keyframes ringExpand{
      from{transform:translate(-50%,-50%) scale(.2);opacity:.84}
      to{transform:translate(-50%,-50%) scale(5.4);opacity:0}
    }

    @keyframes missExpand{
      from{transform:translate(-50%,-50%) scale(.2);opacity:.55}
      to{transform:translate(-50%,-50%) scale(3.1);opacity:0}
    }

    @keyframes screenShake{
      0%{transform:translate(0,0)}
      20%{transform:translate(-4px,2px)}
      40%{transform:translate(4px,-3px)}
      60%{transform:translate(-3px,-2px)}
      80%{transform:translate(3px,2px)}
      100%{transform:translate(0,0)}
    }

    @keyframes metricPop{
      0%{transform:scale(1)}
      45%{transform:scale(1.13)}
      100%{transform:scale(1)}
    }

    @keyframes confettiFall{
      0%{
        transform:translate3d(0,-24px,0) rotate(0deg);
        opacity:0;
      }
      10%{opacity:1}
      100%{
        transform:translate3d(var(--cx), var(--cy), 0) rotate(var(--cr));
        opacity:0;
      }
    }

    @media (max-width: 760px){
      .hud{
        top:max(10px, env(safe-area-inset-top));
        left:max(10px, env(safe-area-inset-left));
        right:max(10px, env(safe-area-inset-right));
        gap:12px;
        padding:12px 12px 14px;
        justify-content:center;
      }
      .miniBrand{
        width:100%;
        text-align:center;
        font-size:22px;
      }
      .hudStats{
        width:100%;
        justify-content:space-between;
        gap:10px 14px;
      }
      .metric span{font-size:10px}
      .metric strong{font-size:22px}
      .ghostBtn{
        min-width:100px;
        padding:11px 14px;
      }
      .timerRail{
        top:132px;
        left:max(10px, env(safe-area-inset-left));
        right:max(10px, env(safe-area-inset-right));
      }
      #arena{inset:148px 0 0 0}
    }

    @media (max-height: 680px){
      .title{font-size:clamp(62px, 12vw, 136px)}
      .heroMascot{font-size:min(40vw, 320px)}
      .subtitle{font-size:16px}
    }

    @media (prefers-reduced-motion: reduce){
      *, *::before, *::after{
        animation:none !important;
        transition:none !important;
      }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="orb a"></div>
    <div class="orb b"></div>
    <div class="orb c"></div>
  </div>

  <main id="app">
    <section id="startScreen" class="screen active">
      <div class="heroMascot">🐔</div>
      <h1 class="title">Chicken<br>Rush</h1>
      <p class="subtitle">Tap the runaway chicken as many times as possible before the clock runs out.</p>
      <div class="ctaRow">
        <button id="startBtn" class="primaryBtn">Start Game</button>
      </div>
      <div class="boardLine">
        <span>Top Score <strong id="topScoreStart">0</strong></span>
      </div>
      <div class="recentWrap">
        <span>Last 5</span>
        <div id="recentStart" class="recentScores"></div>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="hud">
        <div class="miniBrand">Chicken Rush</div>
        <div class="hudStats">
          <div class="metric"><span>Score</span><strong id="scoreValue">0</strong></div>
          <div class="metric"><span>Combo</span><strong id="comboValue">x1</strong></div>
          <div class="metric"><span>Best</span><strong id="bestInGame">0</strong></div>
          <div class="metric"><span>Time</span><strong id="timerValue">20.0</strong></div>
        </div>
        <button id="pauseBtn" class="ghostBtn">Pause</button>
      </div>

      <div class="timerRail">
        <div id="timerFill"></div>
      </div>

      <div id="arena">
        <div id="chickenMover">
          <button id="chicken" aria-label="Click the chicken">
            <span class="chickenGlyph">🐔</span>
          </button>
        </div>
      </div>

      <div id="pauseOverlay">
        <div class="overlayPanel">
          <h2 class="overlayTitle">Paused</h2>
          <p class="overlayText">Catch your breath. Tap resume when you're ready.</p>
          <button id="resumeBtn" class="primaryBtn">Resume</button>
        </div>
      </div>
    </section>

    <section id="endScreen" class="screen">
      <div class="heroMascot">🏆</div>
      <p class="finalLabel">Final Score</p>
      <h2 id="finalScore" class="finalScore">0</h2>
      <p id="bestNote" class="bestNote"></p>
      <div class="ctaRow">
        <button id="playAgainBtn" class="primaryBtn">Play Again</button>
      </div>
      <div class="boardLine">
        <span>Top Score <strong id="topScoreEnd">0</strong></span>
      </div>
      <div class="recentWrap">
        <span>Last 5</span>
        <div id="recentEnd" class="recentScores"></div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const GAME_DURATION = 20000;
      const COMBO_WINDOW = 650;
      const STORAGE_KEY = "chicken-rush-scores-v1";
      const MAX_RECENT = 5;

      const startScreen = document.getElementById("startScreen");
      const gameScreen = document.getElementById("gameScreen");
      const endScreen = document.getElementById("endScreen");

      const startBtn = document.getElementById("startBtn");
      const playAgainBtn = document.getElementById("playAgainBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const resumeBtn = document.getElementById("resumeBtn");

      const arena = document.getElementById("arena");
      const chickenMover = document.getElementById("chickenMover");
      const chicken = document.getElementById("chicken");

      const scoreValue = document.getElementById("scoreValue");
      const comboValue = document.getElementById("comboValue");
      const bestInGame = document.getElementById("bestInGame");
      const timerValue = document.getElementById("timerValue");
      const timerFill = document.getElementById("timerFill");

      const topScoreStart = document.getElementById("topScoreStart");
      const topScoreEnd = document.getElementById("topScoreEnd");
      const recentStart = document.getElementById("recentStart");
      const recentEnd = document.getElementById("recentEnd");
      const finalScore = document.getElementById("finalScore");
      const bestNote = document.getElementById("bestNote");
      const pauseOverlay = document.getElementById("pauseOverlay");

      const state = {
        screen: "start",
        score: 0,
        combo: 0,
        best: 0,
        recent: [],
        timeLeft: GAME_DURATION,
        totalElapsed: 0,
        moveTimer: 0,
        currentMoveMs: 900,
        currentSize: 110,
        lastHitTime: 0,
        lastFrame: 0,
        raf: 0,
        paused: false,
        x: 0,
        y: 0,
        evadeTimeout: 0,
        newBest: false
      };

      let audioCtx = null;

      function loadScores() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          state.best = Number(parsed.best) || 0;
          state.recent = Array.isArray(parsed.recent)
            ? parsed.recent.filter(n => Number.isFinite(n)).slice(0, MAX_RECENT)
            : [];
        } catch {
          state.best = 0;
          state.recent = [];
        }
        updatePersistentUI();
      }

      function saveScores(score) {
        const previousBest = state.best;
        state.best = Math.max(previousBest, score);
        state.newBest = score > previousBest;
        state.recent.unshift(score);
        state.recent = state.recent.slice(0, MAX_RECENT);
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          best: state.best,
          recent: state.recent
        }));
        updatePersistentUI();
      }

      function updatePersistentUI() {
        topScoreStart.textContent = state.best;
        topScoreEnd.textContent = state.best;
        bestInGame.textContent = state.best;
        renderRecent(recentStart, state.recent);
        renderRecent(recentEnd, state.recent);
      }

      function renderRecent(container, scores) {
        container.innerHTML = "";
        if (!scores.length) {
          const empty = document.createElement("span");
          empty.className = "muted";
          empty.textContent = "No rounds yet";
          container.appendChild(empty);
          return;
        }
        scores.forEach(score => {
          const item = document.createElement("span");
          item.className = "recentScore";
          item.textContent = score;
          container.appendChild(item);
        });
      }

      function setActiveScreen(name) {
        state.screen = name;
        startScreen.classList.toggle("active", name === "start");
        gameScreen.classList.toggle("active", name === "playing");
        endScreen.classList.toggle("active", name === "end");
      }

      function ensureAudio() {
        if (!audioCtx) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (Ctx) audioCtx = new Ctx();
        }
        if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
      }

      function playClickSound(combo, bonus) {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        filter.type = "lowpass";
        filter.frequency.setValueAtTime(2000, t);

        osc.type = "triangle";
        osc.frequency.setValueAtTime(560 + Math.min(combo, 12) * 20, t);
        osc.frequency.exponentialRampToValueAtTime(880 + bonus * 90, t + 0.07);

        gain.gain.setValueAtTime(0.001, t);
        gain.gain.exponentialRampToValueAtTime(0.09, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.13);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(t);
        osc.stop(t + 0.14);
      }

      function playEndSound() {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(520, t);
        osc.frequency.exponentialRampToValueAtTime(260, t + 0.22);
        gain.gain.setValueAtTime(0.001, t);
        gain.gain.exponentialRampToValueAtTime(0.06, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.24);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t);
        osc.stop(t + 0.25);
      }

      function flashMetric(el) {
        el.classList.remove("pop");
        void el.offsetWidth;
        el.classList.add("pop");
      }

      function updateHUD() {
        scoreValue.textContent = state.score;
        comboValue.textContent = state.combo > 1 ? `x${state.combo}` : "x1";
        bestInGame.textContent = state.best;
      }

      function updateTimerUI() {
        const ratio = Math.max(0, state.timeLeft / GAME_DURATION);
        timerFill.style.transform = `scaleX(${ratio})`;
        timerValue.textContent = (Math.max(0, state.timeLeft) / 1000).toFixed(1);
        timerValue.style.color = state.timeLeft <= 5000 ? "#ffd453" : "#fff8cf";
      }

      function updateDifficulty() {
        const progress = 1 - Math.max(0, state.timeLeft) / GAME_DURATION;
        state.currentMoveMs = 900 - 620 * progress;
        state.currentSize = 110 - 28 * progress;
        chicken.style.setProperty("--size", `${state.currentSize}px`);
        chickenMover.style.width = `${state.currentSize}px`;
        chickenMover.style.height = `${state.currentSize}px`;
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function moveChicken(initial = false) {
        if (state.screen !== "playing") return;
        const width = arena.clientWidth;
        const height = arena.clientHeight;
        const size = state.currentSize || 110;
        const pad = Math.max(12, size * 0.12);

        const minX = pad;
        const minY = pad;
        const maxX = Math.max(minX, width - size - pad);
        const maxY = Math.max(minY, height - size - pad);

        let x = state.x;
        let y = state.y;
        let tries = 0;
        const minJump = Math.min(width, height) * 0.22;

        do {
          x = randomBetween(minX, maxX);
          y = randomBetween(minY, maxY);
          tries++;
        } while (tries < 12 && Math.hypot(x - state.x, y - state.y) < minJump);

        state.x = x;
        state.y = y;

        chickenMover.style.transitionDuration = initial ? "0ms" : `${Math.max(150, state.currentMoveMs * 0.92)}ms`;
        chickenMover.style.transform = `translate(${x}px, ${y}px)`;
      }

      function spawnParticleBurst(clientX, clientY, bonus) {
        const rect = arena.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        const colors = ["#fff8cf", "#ffd453", "#ff9d3a", "#52e4c4"];
        const glyphs = ["✦", "•", "✧", "•"];
        const count = 8 + Math.min(6, bonus * 2);

        for (let i = 0; i < count; i++) {
          const p = document.createElement("span");
          p.className = "particle";
          p.textContent = glyphs[i % glyphs.length];
          p.style.left = `${x}px`;
          p.style.top = `${y}px`;
          p.style.color = colors[i % colors.length];
          p.style.setProperty("--dx", `${randomBetween(-72, 72)}px`);
          p.style.setProperty("--dy", `${randomBetween(-72, 72)}px`);
          p.style.setProperty("--rot", `${randomBetween(-220, 220)}deg`);
          p.style.fontSize = `${randomBetween(12, 22)}px`;
          arena.appendChild(p);
          setTimeout(() => p.remove(), 780);
        }

        const ring = document.createElement("span");
        ring.className = "hitRing";
        ring.style.left = `${x}px`;
        ring.style.top = `${y}px`;
        arena.appendChild(ring);
        setTimeout(() => ring.remove(), 450);
      }

      function spawnFloatText(points, clientX, clientY, combo) {
        const rect = arena.getBoundingClientRect();
        const text = document.createElement("span");
        text.className = "floatText";
        text.style.left = `${clientX - rect.left}px`;
        text.style.top = `${clientY - rect.top}px`;
        text.textContent = combo > 1 ? `+${points} x${combo}` : `+${points}`;
        arena.appendChild(text);
        setTimeout(() => text.remove(), 850);
      }

      function spawnMissRipple(clientX, clientY) {
        const rect = arena.getBoundingClientRect();
        const ripple = document.createElement("span");
        ripple.className = "missRipple";
        ripple.style.left = `${clientX - rect.left}px`;
        ripple.style.top = `${clientY - rect.top}px`;
        arena.appendChild(ripple);
        setTimeout(() => ripple.remove(), 400);
      }

      function shakeScreen() {
        gameScreen.classList.remove("shake");
        void gameScreen.offsetWidth;
        gameScreen.classList.add("shake");
        setTimeout(() => gameScreen.classList.remove("shake"), 240);
      }

      function handleHit(event) {
        if (state.screen !== "playing" || state.paused) return;
        event.preventDefault();
        event.stopPropagation();
        ensureAudio();

        const now = performance.now();
        state.combo = now - state.lastHitTime <= COMBO_WINDOW ? state.combo + 1 : 1;
        state.lastHitTime = now;

        const bonus = Math.floor((state.combo - 1) / 4);
        const points = 1 + bonus;
        state.score += points;

        updateHUD();
        updateTimerUI();
        flashMetric(scoreValue);
        flashMetric(comboValue);

        chicken.classList.remove("hit");
        void chicken.offsetWidth;
        chicken.classList.add("hit");

        spawnParticleBurst(event.clientX, event.clientY, bonus);
        spawnFloatText(points, event.clientX, event.clientY, state.combo);
        shakeScreen();
        playClickSound(state.combo, bonus);

        clearTimeout(state.evadeTimeout);
        state.evadeTimeout = setTimeout(() => {
          if (state.screen === "playing" && !state.paused) moveChicken();
        }, 55);
      }

      function startGame() {
        ensureAudio();
        clearTimeout(state.evadeTimeout);
        cancelAnimationFrame(state.raf);

        state.score = 0;
        state.combo = 0;
        state.timeLeft = GAME_DURATION;
        state.totalElapsed = 0;
        state.moveTimer = 0;
        state.lastHitTime = 0;
        state.paused = false;
        state.newBest = false;

        scoreValue.textContent = "0";
        comboValue.textContent = "x1";
        bestNote.textContent = "";
        pauseBtn.textContent = "Pause";
        pauseOverlay.classList.remove("show");

        setActiveScreen("playing");
        updateDifficulty();
        updateHUD();
        updateTimerUI();

        requestAnimationFrame(() => {
          moveChicken(true);
          state.lastFrame = performance.now();
          state.raf = requestAnimationFrame(loop);
        });
      }

      function endGame() {
        if (state.screen !== "playing") return;

        clearTimeout(state.evadeTimeout);
        cancelAnimationFrame(state.raf);
        saveScores(state.score);
        playEndSound();

        finalScore.textContent = state.score;
        bestNote.textContent = state.newBest ? "New Top Score!" : "Nice run";
        setActiveScreen("end");

        if (state.newBest) spawnConfetti();
      }

      function pauseGame() {
        if (state.screen !== "playing" || state.paused) return;
        state.paused = true;
        clearTimeout(state.evadeTimeout);
        cancelAnimationFrame(state.raf);
        pauseBtn.textContent = "Resume";
        pauseOverlay.classList.add("show");
      }

      function resumeGame() {
        if (state.screen !== "playing" || !state.paused) return;
        state.paused = false;
        pauseBtn.textContent = "Pause";
        pauseOverlay.classList.remove("show");
        state.lastFrame = performance.now();
        state.raf = requestAnimationFrame(loop);
      }

      function togglePause() {
        if (state.screen !== "playing") return;
        state.paused ? resumeGame() : pauseGame();
      }

      function loop(now) {
        if (state.screen !== "playing" || state.paused) return;

        const delta = Math.min(60, now - state.lastFrame);
        state.lastFrame = now;

        state.timeLeft -= delta;
        state.totalElapsed += delta;
        state.moveTimer += delta;

        updateDifficulty();

        while (state.moveTimer >= state.currentMoveMs) {
          state.moveTimer -= state.currentMoveMs;
          moveChicken();
        }

        if (state.combo > 0 && now - state.lastHitTime > COMBO_WINDOW) {
          state.combo = 0;
          comboValue.textContent = "x1";
        }

        updateTimerUI();

        if (state.timeLeft <= 0) {
          state.timeLeft = 0;
          updateTimerUI();
          endGame();
          return;
        }

        state.raf = requestAnimationFrame(loop);
      }

      function spawnConfetti() {
        const colors = ["#ffd453", "#ff8c32", "#52e4c4", "#fff8cf", "#ff5b4d"];
        for (let i = 0; i < 28; i++) {
          const piece = document.createElement("span");
          piece.className = "confetti";
          piece.style.left = `${randomBetween(15, 85)}vw`;
          piece.style.top = `8vh`;
          piece.style.background = colors[i % colors.length];
          piece.style.setProperty("--cx", `${randomBetween(-140, 140)}px`);
          piece.style.setProperty("--cy", `${randomBetween(220, 460)}px`);
          piece.style.setProperty("--cr", `${randomBetween(-360, 360)}deg`);
          endScreen.appendChild(piece);
          setTimeout(() => piece.remove(), 2100);
        }
      }

      startBtn.addEventListener("pointerdown", () => {
        ensureAudio();
        startGame();
      });

      playAgainBtn.addEventListener("pointerdown", () => {
        ensureAudio();
        startGame();
      });

      pauseBtn.addEventListener("pointerdown", togglePause);
      resumeBtn.addEventListener("pointerdown", resumeGame);
      chicken.addEventListener("pointerdown", handleHit);

      arena.addEventListener("pointerdown", (event) => {
        if (state.screen !== "playing" || state.paused) return;
        if (event.target.closest("#chicken")) return;
        spawnMissRipple(event.clientX, event.clientY);
      });

      window.addEventListener("resize", () => {
        if (state.screen === "playing") moveChicken(true);
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden && state.screen === "playing" && !state.paused) pauseGame();
      });

      document.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();

        if ((event.code === "Space" || event.code === "Enter") && state.screen !== "playing") {
          event.preventDefault();
          startGame();
          return;
        }

        if (key === "p" || event.code === "Escape") {
          event.preventDefault();
          togglePause();
        }
      });

      document.body.addEventListener("pointerdown", ensureAudio, { once: true });

      loadScores();
      updateHUD();
      updateTimerUI();
    })();
  </script>
</body>
</html>
